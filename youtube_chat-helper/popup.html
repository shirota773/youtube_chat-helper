<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Chat Helper</title>
    <style>
        body {
            width: 340px;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            margin: 0;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 12px 0;
            color: #333;
        }

        h2 {
            font-size: 13px;
            margin: 0 0 8px 0;
            color: #555;
        }

        .setting-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .setting-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .setting-item label {
            cursor: pointer;
            flex: 1;
        }

        .setting-desc {
            font-size: 11px;
            color: #666;
            margin: 0 0 12px 8px;
            line-height: 1.4;
        }

        .status {
            font-size: 12px;
            color: #4caf50;
            margin-top: 8px;
            padding: 6px;
            background: #e8f5e9;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .divider {
            height: 1px;
            background: #ddd;
            margin: 12px 0;
        }

        .info {
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .diag-buttons {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .diag-buttons button {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }

        .diag-buttons button:hover {
            background: #f0f0f0;
        }

        .diag-buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #diag-result {
            font-family: "Consolas", "Monaco", monospace;
            font-size: 11px;
            line-height: 1.5;
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 4px;
            padding: 8px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }

        #diag-result .ok { color: #4ec9b0; }
        #diag-result .fail { color: #f44747; }
        #diag-result .label { color: #9cdcfe; }
        #diag-result .value { color: #ce9178; }
        #diag-result .section { color: #569cd6; font-weight: bold; }
    </style>
</head>
<body>
    <h1>YouTube Chat Helper</h1>

    <div class="setting-item">
        <input type="checkbox" id="ccppp-toggle" checked>
        <label for="ccppp-toggle">CCPPP を有効にする</label>
    </div>
    <p class="setting-desc">
        :emoji_name: 形式のテキストを自動的にクリック可能なボタンに変換します
    </p>

    <div class="setting-item">
        <input type="checkbox" id="autoload-toggle" checked>
        <label for="autoload-toggle">スタンプ自動読み込み</label>
    </div>
    <p class="setting-desc">
        ページ読み込み時に絵文字を事前読み込みします
    </p>

    <div class="status" id="status">設定を保存しました</div>

    <div class="divider"></div>

    <h2>診断ツール</h2>
    <div class="diag-buttons">
        <button id="btn-diag">状態を確認</button>
        <button id="btn-channel">チャンネル検出</button>
    </div>
    <div id="diag-result"></div>

    <div class="divider"></div>

    <div class="info">
        Version 3.0
    </div>

    <script src="popup.js"></script>
</body>
</html>
