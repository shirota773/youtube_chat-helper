<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Chat Helper</title>
    <style>
        body {
            width: 280px;
            padding: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            margin: 0;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 12px 0;
            color: #333;
        }

        .setting-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .setting-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .setting-item label {
            cursor: pointer;
            flex: 1;
        }

        .setting-desc {
            font-size: 11px;
            color: #666;
            margin: 0 0 12px 8px;
            line-height: 1.4;
        }

        .setting-field {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .setting-field label {
            width: 132px;
            font-size: 12px;
            color: #444;
        }

        .setting-field input[type="text"] {
            flex: 1;
            font-size: 12px;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .status {
            font-size: 12px;
            color: #4caf50;
            margin-top: 8px;
            padding: 6px;
            background: #e8f5e9;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .divider {
            height: 1px;
            background: #ddd;
            margin: 12px 0;
        }

        .info {
            font-size: 11px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>YouTube Chat Helper</h1>

    <div class="setting-item">
        <input type="checkbox" id="ccppp-toggle" checked>
        <label for="ccppp-toggle">CCPPP を有効にする</label>
    </div>
    <p class="setting-desc">
        :emoji_name: 形式のテキストを自動的にクリック可能なボタンに変換します
    </p>

    <div class="setting-item">
        <input type="checkbox" id="autoload-toggle" checked>
        <label for="autoload-toggle">スタンプ自動読み込み</label>
    </div>
    <p class="setting-desc">
        ページ読み込み時に絵文字を事前読み込みします
    </p>

    <div class="setting-item">
        <input type="checkbox" id="hide-emoji-titles-toggle">
        <label for="hide-emoji-titles-toggle">絵文字カテゴリタイトルを非表示</label>
    </div>

    <div class="setting-item">
        <input type="checkbox" id="hide-emoji-search-toggle">
        <label for="hide-emoji-search-toggle">絵文字検索欄を非表示</label>
    </div>

    <div class="setting-item">
        <input type="checkbox" id="hide-chat-header-toggle">
        <label for="hide-chat-header-toggle">チャットトップバナーを非表示</label>
    </div>

    <div class="setting-item">
        <input type="checkbox" id="panel-position-toggle" checked>
        <label for="panel-position-toggle">入力欄位置をカスタム配置</label>
    </div>

    <p class="setting-desc">
        以下は <code>#contents #panel-pages</code> の値です（未入力時はデフォルト使用）
    </p>

    <div class="setting-field">
        <label for="panel-pages-width">width</label>
        <input type="text" id="panel-pages-width" placeholder="var(--my-chat-panel-pages-width)">
    </div>
    <div class="setting-field">
        <label for="panel-pages-height">height</label>
        <input type="text" id="panel-pages-height" placeholder="var(--my-chat-panel-pages-height)">
    </div>
    <div class="setting-field">
        <label for="panel-pages-max-height">max-height</label>
        <input type="text" id="panel-pages-max-height" placeholder="initial">
    </div>
    <div class="setting-field">
        <label for="panel-pages-max-width">max-width</label>
        <input type="text" id="panel-pages-max-width" placeholder="450px">
    </div>
    <div class="setting-field">
        <label for="panel-pages-min-width">min-width</label>
        <input type="text" id="panel-pages-min-width" placeholder="300px">
    </div>
    <div class="setting-field">
        <label for="panel-pages-right">right</label>
        <input type="text" id="panel-pages-right" placeholder="0">
    </div>
    <div class="setting-field">
        <label for="panel-pages-left">left</label>
        <input type="text" id="panel-pages-left" placeholder="(empty)">
    </div>

    <div class="status" id="status">設定を保存しました</div>

    <div class="divider"></div>

    <div class="info">
        Version 2.4
    </div>

    <script src="popup.js"></script>
</body>
</html>
